name: Deploy to GoDaddy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy theme
        run: |
          rsync -avz --delete --exclude=samples/ \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./wp-content/themes/execor/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/cb7kn7l8ecwu/public_html/threeohfivestudios.com/wp-content/themes/execor/

      - name: Deploy plugin
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./wp-content/plugins/vamtam-elementor-integration-execor/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/cb7kn7l8ecwu/public_html/threeohfivestudios.com/wp-content/plugins/vamtam-elementor-integration-execor/
